name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      CONVEX_URL: https://blessed-pig-525.convex.cloud
      NEXT_PUBLIC_CONVEX_URL: https://blessed-pig-525.convex.cloud
      SITE_URL: https://openfolio.ai
      OPENFOLIO_SITE_URL: https://openfolio.ai
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Validate release secrets
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"

      - name: Write Apple API key to file
        run: |
          mkdir -p "$RUNNER_TEMP/secrets"
          echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/secrets/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}

      - name: Publish signed macOS release
        run: pnpm --filter @openfolio/mac release:mac
        env:
          APPLE_API_KEY: ${{ runner.temp }}/secrets/AuthKey.p8
